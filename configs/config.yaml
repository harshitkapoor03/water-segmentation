data:
  raw_image_dir: "data/Images"
  raw_mask_dir: "data/Masks"
  patches_image_dir: "data/patches/images"
  patches_mask_dir: "data/patches/masks"
  patch_size: 256
  #stride: 128
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

training:
  model_name: "unet"
  encoder: "resnet34"
  encoder_weights: "imagenet"
  batch_size: 32
  num_epochs: 15
  learning_rate: 0.0001
  weight_decay: 0.0001
  bce_weight: 0.5
  early_stopping_patience: 5
  checkpoint_path: "checkpoints/best_model.pth"
  device: "cuda"
  num_workers: 0
  freeze_encoder: false
  freeze_layers: "all"    # "all" or "partial"

inference: 
  model_path: "checkpoints/resnet34_lr0.0001_bce0.3_resize_epochs50/best_model.pth"
  threshold: 0.5
  use_tiling: false 


mlflow:
  experiment_name: "water-segmentation"
  tracking_uri: "sqlite:///mlflow.db"

logging:
  level: "INFO"
  log_file: "logs/app.log"
